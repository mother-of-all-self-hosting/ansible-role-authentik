---
- name: Prepare authentik Molecule tests
  hosts: all
  become: true
  gather_facts: true
  tasks:
    - name: Ensure apt cache is updated for authentik Molecule tests preparation
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 600
      when: ansible_os_family == 'Debian'

    - name: Ensure required packages are installed for authentik Molecule tests preparation
      ansible.builtin.package:
        name:
          - python3-requests
        state: present

    - name: Ensure Docker is installed for authentik Molecule tests preparation
      ansible.builtin.include_role:
        name: ansible-role-docker
      vars:
        docker_daemon_options:
          storage-driver: vfs
