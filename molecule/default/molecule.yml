---
dependency:
  name: galaxy
  options:
    requirements-file: requirements.yml
    force: true
driver:
  name: docker
platforms:
  - name: authentik-${MOLECULE_DISTRO:-ubuntu2604}-default
    image: "geerlingguy/docker-${MOLECULE_DISTRO:-ubuntu2604}-ansible:latest"
    command: ${MOLECULE_DOCKER_COMMAND:-""}
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    privileged: true
    pre_build_image: true
provisioner:
  name: ansible
  config_options:
    defaults:
      callback_result_format: yaml
  inventory:
    group_vars:
      all:
        # Helper variables
        authentik_debug_service_worker_enabled: false
        authentik_debug_service_server_enabled: false

        # Variables for authentik
        authentik_uid: 1000
        authentik_gid: 1000
        authentik_hostname: localhost
        authentik_container_labels_traefik_enabled: false
        authentik_container_http_host_bind_port: 9000
        authentik_secret_key: secret

        # Variables required for authentik to connect to the Postgres database
        authentik_database_hostname: "{{ postgres_connection_hostname }}"
        authentik_database_port: "{{ postgres_connection_port }}"
        authentik_database_username: my_database_username
        authentik_database_password: my_database_password
        authentik_database_name: authentik
        authentik_systemd_required_services_list_auto: |
          {{
            (['postgres.service'])
          }}

        # Variables for Postgres
        postgres_uid: 1000
        postgres_gid: 1000
        postgres_connection_password: postgres_password
        postgres_container_network: "{{ authentik_container_network }}"
        postgres_managed_databases: |
          {{
            [{
              'name': authentik_database_name,
              'username': authentik_database_username,
              'password': authentik_database_password,
            }]
          }}
  env:
    # Workaround for https://github.com/ansible/molecule/issues/4391
    ANSIBLE_ROLES_PATH: ${MOLECULE_PROJECT_DIRECTORY}/..:/.ansible/roles:/usr/share/ansible/roles:/etc/ansible/roles:~/.ansible/roles
scenario:
  # See: https://docs.ansible.com/projects/molecule/configuration/?h=test_sequence#scenario
  test_sequence:
    - dependency
    - cleanup
    - destroy
    - syntax
    - create
    - prepare
    - converge
    # Disable idempotence test for now due to ansible-role-postgres
    # - idempotence
    - side_effect
    - verify
    - cleanup
    - destroy
verifier:
  name: ansible
