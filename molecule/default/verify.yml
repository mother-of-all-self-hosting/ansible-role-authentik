---
- name: Verify authentik systemd service
  hosts: all
  become: true
  gather_facts: false
  tasks:
    - name: Wait for authentik worker service to become active (up to 180s)
      ansible.builtin.systemd:
        name: authentik-worker.service
      register: authentik_service_worker
      until: authentik_service_worker.status.ActiveState == 'active'
      retries: 36
      delay: 5

    - name: Assert authentik worker service is active
      ansible.builtin.assert:
        that: authentik_service_worker.status.ActiveState == 'active'
        fail_msg: "authentik-worker.service not active ({{ authentik_service_worker.status.ActiveState }})"
        success_msg: "authentik-worker.service is active"

    - name: Retrieve authentik worker service log for debugging
      when: authentik_debug_service_worker_enabled | bool
      ansible.builtin.command:
        cmd: journalctl -xeu authentik-worker.service
      changed_when: false

    - name: Wait for authentik server service to become active (up to 180s)
      ansible.builtin.systemd:
        name: authentik-server.service
      register: authentik_service_server
      until: authentik_service_server.status.ActiveState == 'active'
      retries: 36
      delay: 5

    - name: Assert authentik server service is active
      ansible.builtin.assert:
        that: authentik_service_server.status.ActiveState == 'active'
        fail_msg: "authentik-server.service not active ({{ authentik_service_server.status.ActiveState }})"
        success_msg: "authentik-server.service is active"

    - name: Retrieve authentik service log for debugging
      when: authentik_debug_service_server_enabled | bool
      ansible.builtin.command:
        cmd: journalctl -xeu authentik-server.service
      changed_when: false

    - name: Wait for authentik HTTP endpoint to respond (up to 10m)
      ansible.builtin.uri:
        url: "http://localhost:9000/"
        method: GET
        status_code: [200, 302]
        follow_redirects: none
      register: authentik_endpoint
      until: authentik_endpoint.status in [200, 302]
      retries: 120
      delay: 5

    - name: Assert authentik HTTP endpoint responds
      ansible.builtin.assert:
        that: authentik_endpoint.status in [200, 302]
        fail_msg: "authentik did not respond as expected ({{ authentik_endpoint.status | default('no response') }})"
        success_msg: "authentik responded with {{ authentik_endpoint.status }}"

    - name: Show authentik systemd services status summary
      ansible.builtin.debug:
        msg:
          - "authentik worker systemd: {{ authentik_service_worker.status.ActiveState }}"
          - "authentik server systemd: {{ authentik_service_server.status.ActiveState }}"
          - "authentik HTTP: {{ authentik_endpoint.status }}"
