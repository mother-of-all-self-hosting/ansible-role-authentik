---
- name: "Check existence of authentik systemd service — {{ item.service }}"
  ansible.builtin.stat:
    path: "{{ item.path }}"
  register: authentik_service_stat

- name: Uninstall the systemd service
  when: authentik_service_stat.stat.exists | bool
  block:
    - name: Ensure the systemd service is stopped
      ansible.builtin.service:
        name: "{{ item.service }}"
        state: stopped
        daemon_reload: true

    - name: Ensure the service does not exist
      ansible.builtin.file:
        dest: "{{ item.path }}"
        state: absent
